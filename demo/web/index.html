<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管家 · 收发站</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <span>管家 · 收发站</span>
        <span class="sub">Commitment Agent</span>
      </div>
      <div class="topbar-right">
        <span class="clock" id="clock">—</span>
        <button type="button" class="play" id="play">▶ 剧场</button>
        <button type="button" class="ghost" id="reset">重置</button>
      </div>
    </header>

    <main class="grid">
      <!-- 左：群聊收发 -->
      <section class="pane chat">
        <div class="pane-head">群聊 <span class="muted">#core-dev</span></div>
        <div class="feed" id="feed"></div>
        <div class="composer">
          <div class="chips" id="chips"></div>
          <div class="composer-row">
            <select id="speaker"></select>
            <input id="text" placeholder="替 TA 在群里说句话…" autocomplete="off" />
            <button type="button" id="send">发送</button>
          </div>
        </div>
      </section>

      <!-- 右：台账 + 快进 -->
      <aside class="pane ledger">
        <div class="pane-head">
          台账
          <span class="time-controls">
            <button type="button" class="ghost" data-adv="+1d">⏩ +1天</button>
            <button type="button" class="ghost" data-adv="due">⏩ 到临期</button>
            <button type="button" class="ghost" data-adv="overdue">⏩ 到逾期次日</button>
          </span>
        </div>
        <div class="cards" id="cards"></div>
        <div class="digest" id="digest"></div>
      </aside>
    </main>

    <footer class="foot">
      判断逻辑是真实代码，模型与外部接口（LLM / 链接 / GitHub）在本机模拟。
    </footer>

    <div class="overlay" id="overlay" hidden></div>

    <script src="/app.js"></script>
  </body>
</html>
