name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Lint & format (Biome)
        run: npx @biomejs/biome ci src test demo
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
